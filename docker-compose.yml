version: '3.8'

services:
  # Base de datos principal - PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: academe_postgres
    environment:
      POSTGRES_USER: academe
      POSTGRES_PASSWORD: academe_dev
      POSTGRES_DB: academe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/app/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academe"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache y sesiones - Redis 7
  redis:
    image: redis:7-alpine
    container_name: academe_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Backend Go (se construirá después de crear los archivos)
  backend:
    build: ./backend
    container_name: academe_backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://academe:academe_dev@postgres:5432/academe?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=tu_secreto_super_seguro_cambiar_en_produccion
      - PORT=8080
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    working_dir: /app
    # Descomentar cuando el backend esté listo
    # command: go run cmd/server/main.go

volumes:
  postgres_data:
  redis_data:
